name: "BeyondBox Gateway"
description: >
  Verbindet Zigbee-Sensoren (via Zigbee2MQTT + Mosquitto) mit der BeyondBox-Plattform.
  Liest Sensordaten vom lokalen MQTT-Broker und leitet sie an idb.beyondbuildings.de weiter.
version: "1.0.0"
slug: "beyondbox_gateway"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

startup: application
boot: auto

# Allow access to Supervisor API (needed to read options if /data/options.json is not readable)
auth_api: true

# Persistent storage for API key, InfluxDB cache, rendered telegraf.conf
map:
  - data

options:
  mqtt_host: "localhost"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "zigbee2mqtt"
  gateway_name: "Mein Zuhause"
  management_url: "https://app.beyondbuildings.de"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  mqtt_topic_prefix: str
  gateway_name: str
  management_url: str
