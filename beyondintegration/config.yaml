name: "Beyond Integration"
description: >
  Verbindet Zigbee-Sensoren (via Zigbee2MQTT + Mosquitto) mit der BeyondBox-Plattform.
  Schreibt Sensordaten direkt in InfluxDB 2 (Token-Auth, org/bucket).
version: "1.0.7"
slug: "beyondintegration"
init: false
run_as_root: true

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

startup: application
boot: auto

# Persistent storage for API key, InfluxDB cache, rendered telegraf.conf
map:
  - data

options:
  mqtt_host: "localhost"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "zigbee2mqtt"
  gateway_name: "Mein Zuhause"
  management_url: "https://app.beyondbuildings.de"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  mqtt_topic_prefix: str
  gateway_name: str
  management_url: str
